<a class="btn btn-primary" id="refresh" href="#">
  <span class="glyphicon glyphicon-refresh"></span>
  Refresh
</a>

<% if (canImportMods) { %>
  <button class="btn btn-warning" id="update-workshop" type="button">
    Check &amp; update Workshop mods
  </button>
  <form id="import-html" class="mt-3 mb-3">
    <div class="mb-3">
      <label for="presetHtml" class="form-label">FAST HTML preset</label>
      <input type="file" class="form-control" id="presetHtml" name="presetHtml" accept=".html,.htm,text/html">
    </div>
    <button class="btn btn-secondary" type="submit">Import from HTML</button>
  </form>
<% } %>

<form>
  <div class="form-group">
    <label for="filterMods">Filter</label>
    <input type="text" class="form-control" id="filterMods" placeholder="Filter mods..." value="<%-filterValue%>">
  </div>
</form>

<div id="list"></div>
