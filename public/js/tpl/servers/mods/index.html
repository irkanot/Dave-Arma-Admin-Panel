<div class="server-mods-config">
  <% if (canEditServer) { %>
    <form id="server-import-html" class="server-mods-import mb-3">
      <div class="form-group">
        <label for="serverPresetHtml">Import server mod list from HTML preset</label>
        <div class="input-group">
          <input type="file" class="form-control" id="serverPresetHtml" accept=".html,.htm,text/html">
          <button class="btn btn-primary" type="submit">Import list</button>
        </div>
        <p class="help-block">This selects matching installed mods for this server. It does not download Workshop items.</p>
      </div>
    </form>
  <% } %>

  <form>
    <div class="form-group">
      <label for="filterMods">Filter installed mods</label>
      <input type="text" class="form-control" id="filterMods" placeholder="Filter mods..." value="<%-filterValue%>">
    </div>
  </form>

  <div class="row">
    <div class="col-md-6">
      <div id="available"></div>
    </div>
    <div class="col-md-6">
      <div id="selected"></div>
    </div>
  </div>
</div>
